<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00AAFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00AAFF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#grad1)" filter="url(#glow)" opacity="0.8"/>
  
  <!-- Scan lines - forming a barcode/target -->
  <g stroke="#00F5FF" stroke-width="3" fill="none">
    <!-- Horizontal lines -->
    <line x1="40" y1="60" x2="160" y2="60" />
    <line x1="40" y1="80" x2="160" y2="80" />
    <line x1="40" y1="100" x2="160" y2="100" />
    <line x1="40" y1="120" x2="160" y2="120" />
    <line x1="40" y1="140" x2="160" y2="140" />
    
    <!-- Vertical lines on sides -->
    <line x1="50" y1="40" x2="50" y2="160" />
    <line x1="150" y1="40" x2="150" y2="160" />
  </g>
  
  <!-- Central dot (scanner laser) -->
  <circle cx="100" cy="100" r="12" fill="#00F5FF">
    <animate attributeName="r" values="12;16;12" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#00F5FF" stroke-width="2" stroke-dasharray="5,5">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="10s" repeatCount="indefinite" />
  </circle>
  
  <!-- Logo text - optional for app icon -->
  <!-- Uncomment if needed for certain use cases -->
  <!-- <text x="100" y="185" font-family="SF Pro, Arial" font-size="14" fill="#00F5FF" text-anchor="middle" font-weight="bold">Prix Vif</text> -->
</svg>
